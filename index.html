<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>WR Hacks · Seguridad & Hacks</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
      background: linear-gradient(145deg, #0b0e14 0%, #141a24 100%);
      min-height: 100vh;
      color: #eef2fb;
      padding: 1rem 1.5rem 2.5rem;
    }
    /* Barra superior */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    h1 {
      font-weight: 700;
      font-size: 2.2rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #c0e0ff, #a0d0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px rgba(0,160,255,0.5);
    }
    .lang-switch {
      display: flex;
      gap: 8px;
      background: #1e2632;
      padding: 4px;
      border-radius: 40px;
      border: 1px solid #2e3a4a;
    }
    .lang-btn {
      background: transparent;
      border: none;
      color: #9aabbf;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.9rem;
    }
    .lang-btn.active {
      background: #2a6df4;
      color: white;
      box-shadow: 0 4px 10px rgba(42,109,244,0.4);
    }
    .star-btn {
      background: #1f2a38;
      border: 2px solid #3e4f62;
      color: #f5e37a;
      font-size: 2rem;
      line-height: 1;
      width: 52px;
      height: 52px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 10px #ffd96655;
      transition: 0.2s;
      font-weight: bold;
    }
    .star-btn:hover {
      background: #2f3e52;
      border-color: #f3c26b;
      transform: scale(1.02);
    }
    /* contenedor principal */
    .view-container {
      background: rgba(18, 26, 36, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 36px;
      padding: 2rem 2rem 2.5rem;
      border: 1px solid #2e4058;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      margin-top: 0.5rem;
    }
    /* botones principales */
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      margin: 2.5rem 0 1rem;
    }
    .main-btn {
      background: #1f2c3c;
      border: 1.5px solid #3e5f7a;
      color: white;
      font-weight: 700;
      font-size: 1.5rem;
      padding: 1.2rem 2.5rem;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 10px 0 #0e151e;
      transition: all 0.1s ease;
      min-width: 240px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .main-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 13px 0 #0e151e;
      background: #27425c;
      border-color: #5a8ab9;
    }
    .main-btn.premium {
      background: #b8860b20;
      border-color: #e5b83c;
      backdrop-filter: blur(4px);
      box-shadow: 0 10px 0 #7a5c1a;
      color: #ffdf8c;
    }
    .main-btn.demo {
      background: #1e3a4d;
      border-color: #4f9bc2;
    }

    /* cards / planes */
    .plan-card {
      background: #0e1a26;
      border-radius: 32px;
      padding: 2rem;
      border: 1px solid #2f5777;
      margin: 2rem 0;
    }
    .price-tag {
      font-size: 3.2rem;
      font-weight: 800;
      color: #f5d371;
    }
    .feature-list {
      list-style: none;
      margin: 1.8rem 0;
    }
    .feature-list li {
      padding: 0.5rem 0;
      border-bottom: 1px dashed #304a60;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .buy-btn {
      background: #ffb347;
      border: none;
      color: #0b1219;
      font-weight: bold;
      font-size: 1.5rem;
      padding: 1rem 2.5rem;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 6px 0 #b16f1a;
      transition: 0.1s;
      width: fit-content;
      margin-top: 1.5rem;
    }
    .buy-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #b16f1a;
      background: #ffc86b;
    }

    /* demo options */
    .demo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin: 2rem 0;
    }
    .demo-panel {
      background: #101e2b;
      border-radius: 24px;
      padding: 1.8rem;
      border: 1px solid #2d4b64;
    }
    .input-group {
      margin: 1rem 0;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      background: #1d2c3b;
      border: 1px solid #3c607a;
      border-radius: 20px;
      color: white;
      font-size: 1rem;
    }
    .action-btn {
      background: #26648b;
      border: none;
      color: white;
      padding: 12px 20px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
      transition: 0.1s;
    }
    .action-btn.call {
      background: #1b7a4a;
    }

    /* modal admin */
    .modal-overlay {
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: #000000c0;
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .admin-panel {
      background: #132433;
      border-radius: 32px;
      padding: 1.8rem 2rem;
      max-width: 800px;
      width: 95%;
      max-height: 85vh;
      overflow-y: auto;
      border: 2px solid #4a779e;
      box-shadow: 0 0 40px #00000080;
    }
    .password-input {
      background: #1a2c3f;
      border: 1px solid #bc9b4a;
      padding: 14px;
      border-radius: 30px;
      width: 70%;
      color: white;
    }
    .close-icon {
      float: right;
      font-size: 28px;
      cursor: pointer;
    }
    .record-item {
      background: #1c3143;
      border-radius: 18px;
      padding: 12px;
      margin: 10px 0;
    }
    .flex-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .badge {
      background: #3a6282;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
    }
    .back-home {
      margin-top: 30px;
      background: none;
      border: 1px solid #557c9a;
      color: #bdd4e6;
      padding: 10px 22px;
      border-radius: 30px;
      cursor: pointer;
    }
    .url-indicator {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-top: 16px;
    }
  </style>
</head>
<body>

<!-- Barra fija superior -->
<div class="top-bar">
  <h1>⚡ WR HACKS</h1>
  <div style="display: flex; gap: 15px; align-items: center;">
    <div class="lang-switch" id="langSwitch">
      <button class="lang-btn active" data-lang="es">🇪🇸 ES</button>
      <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
    </div>
    <div class="star-btn" id="starAdminBtn" title="Panel Admin">✱</div>
  </div>
</div>

<!-- CONTENEDOR DINÁMICO DE VISTAS -->
<div class="view-container" id="viewContainer">
  <!-- Se rellena vía JS según ruta -->
</div>

<!-- MODAL ADMIN (oculto por defecto) -->
<div id="adminModal" style="display: none;" class="modal-overlay">
  <div class="admin-panel">
    <div style="display: flex; justify-content: space-between;">
      <h2 style="color: #efc56b;">🔐 Admin WR Hacks</h2>
      <span class="close-icon" id="closeAdminModal">&times;</span>
    </div>
    <div id="adminLoginSection">
      <p style="margin: 20px 0 8px;">🔑 Introduce contraseña:</p>
      <div class="flex-row">
        <input type="password" id="adminPassInput" class="password-input" placeholder="••••••••">
        <button id="submitPassBtn" style="background:#c9a53b; border:none; padding:12px 22px; border-radius:40px; font-weight:bold;">Acceder</button>
      </div>
      <p id="passError" style="color:#ff8888; margin-top:8px;"></p>
    </div>
    <div id="adminContentArea" style="display: none;">
      <!-- Contenido tras login correcto -->
      <div style="margin: 20px 0;">
        <h3>📞 Registro de llamadas</h3>
        <div id="callLogList"></div>
        <h3 style="margin-top:25px;">📅 Solicitudes de llamada (Google Calendar)</h3>
        <div id="appointmentList"></div>
        <h3 style="margin-top:25px;">🔴 Llamada en directo</h3>
        <div id="liveCallPanel" style="background:#1a2e40; border-radius:20px; padding:18px;">
          <span id="noLiveCallMsg">No hay llamada entrante.</span>
          <div id="activeCallActions" style="display:none;">
            <p><span id="liveCallerInfo"></span></p>
            <button id="acceptCallAdminBtn" style="background:#1e7e4a; border:none; padding:10px 20px; border-radius:30px; margin-right:15px;">✅ Aceptar</button>
            <button id="rejectCallAdminBtn" style="background:#9e3b3b; border:none; padding:10px 20px; border-radius:30px;">❌ Rechazar</button>
          </div>
        </div>
        <p style="margin-top:20px;"><i>Admin: Alex27Junio</i></p>
      </div>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- ESTADO GLOBAL ----------
    let currentLang = 'es';
    let currentView = 'home';        // home, premium, demo
    let adminAuthorized = false;
    
    // Datos simulados
    let callRecords = [
      { id: 1, timestamp: '2026-04-20 14:23', country: 'España', status: 'perdida' },
      { id: 2, timestamp: '2026-04-21 09:07', country: 'México', status: 'atendida' },
    ];
    let appointments = [
      { id: 'apt1', name: 'Carlos', datetime: '2026-04-22T15:30', email: 'carlos@mail.com', status: 'pendiente' }
    ];
    let pendingLiveCall = null;       // { callerName, timestamp, id }
    let callInterval = null;

    // i18n textos
    const texts = {
      es: {
        homeTitle: 'Protección élite · Hacks avanzados',
        premiumBtn: '🔒 VER PLANES PREMIUM',
        demoBtn: '🧪 DEMO',
        premiumTitle: 'Plan WR Hacks Ultimate',
        price: '4,99€',
        features: [
          '✅ Seguridad de grado militar (WAF + Zero-Day)',
          '✅ Acceso a mejores Hacks 2026 (exploits privados)',
          '✅ Análisis de vulnerabilidades ilimitado',
          '✅ Soporte prioritario 24/7',
          '✅ Herramientas de anonimato y OSINT',
          '✅ Actualizaciones semanales de 0days'
        ],
        buy: '💳 COMPRAR PLAN · 4,99€',
        back: '⬅ Volver al inicio',
        demoMsg: 'Enviar mensaje al dueño',
        callOwner: '📞 Llamar al dueño',
        scheduleCall: 'Programar llamada (Google Calendar)',
        yourName: 'Tu nombre',
        datetime: 'Fecha y hora',
        sendMsg: 'Enviar mensaje',
        callNow: 'Llamar ahora',
        gmailContact: 'contactnotifieralex@gmail.com',
        urlPremiumNote: 'https://WRHacks.vercel.app/premium',
        urlDemoNote: 'https://WRHacks.vercel.app/demo',
        calling: 'Llamando...',
      },
      en: {
        homeTitle: 'Elite protection · Advanced Hacks',
        premiumBtn: '🔒 VIEW PREMIUM PLANS',
        demoBtn: '🧪 DEMO',
        premiumTitle: 'WR Hacks Ultimate Plan',
        price: '€4.99',
        features: [
          '✅ Military-grade security (WAF + Zero-Day)',
          '✅ Access to best 2026 Hacks (private exploits)',
          '✅ Unlimited vulnerability analysis',
          '✅ 24/7 priority support',
          '✅ Anonymity & OSINT tools',
          '✅ Weekly 0day updates'
        ],
        buy: '💳 BUY PLAN · €4.99',
        back: '⬅ Back to home',
        demoMsg: 'Send message to owner',
        callOwner: '📞 Call owner',
        scheduleCall: 'Schedule call (Google Calendar)',
        yourName: 'Your name',
        datetime: 'Date & time',
        sendMsg: 'Send message',
        callNow: 'Call now',
        gmailContact: 'contactnotifieralex@gmail.com',
        urlPremiumNote: 'https://WRHacks.vercel.app/premium',
        urlDemoNote: 'https://WRHacks.vercel.app/demo',
        calling: 'Calling...',
      }
    };

    // ---------- HELPERS ----------
    function t(key) {
      return texts[currentLang][key] || key;
    }

    // Actualizar UI según idioma
    function updateLangUI() {
      document.querySelectorAll('[data-lang]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
      renderView(); // re-renderiza vista actual
    }

    // Router simple basado en pushState + popstate
    function navigateTo(view) {
      currentView = view;
      let path = view === 'home' ? '/' : '/' + view;
      window.history.pushState({ view }, '', path);
      renderView();
    }

    function renderView() {
      const container = document.getElementById('viewContainer');
      if (currentView === 'home') {
        container.innerHTML = renderHome();
      } else if (currentView === 'premium') {
        container.innerHTML = renderPremium();
      } else if (currentView === 'demo') {
        container.innerHTML = renderDemo();
      }
      // Actualizar indicador de URL
      const urlNote = document.querySelector('.url-indicator');
      if (!urlNote) {
        const note = document.createElement('div');
        note.className = 'url-indicator';
        container.appendChild(note);
      }
      const noteDiv = container.querySelector('.url-indicator');
      if (noteDiv) {
        noteDiv.textContent = `📍 ${window.location.origin}${window.location.pathname}`;
      }
    }

    // HOME
    function renderHome() {
      return `
        <div style="text-align:center;">
          <h2 style="font-size:2rem; margin-bottom:1.2rem;">${t('homeTitle')}</h2>
          <div class="hero-actions">
            <button class="main-btn premium" id="goPremiumBtn">${t('premiumBtn')}</button>
            <button class="main-btn demo" id="goDemoBtn">${t('demoBtn')}</button>
          </div>
          <p style="margin-top:30px; opacity:0.8;">WR Hacks · seguridad ofensiva</p>
        </div>
      `;
    }

    // PREMIUM
    function renderPremium() {
      const featuresHtml = texts[currentLang].features.map(f => `<li>${f}</li>`).join('');
      return `
        <div>
          <h2 style="font-size:2.2rem;">⚡ ${t('premiumTitle')}</h2>
          <div class="plan-card">
            <div class="price-tag">${t('price')} <span style="font-size:1.2rem;">/único</span></div>
            <ul class="feature-list">${featuresHtml}</ul>
            <button class="buy-btn" id="buyPlanBtn">${t('buy')}</button>
            <p style="margin-top:16px; font-size:0.9rem;">Pago seguro · Acceso inmediato</p>
          </div>
          <button class="back-home" id="backHomeBtn">${t('back')}</button>
          <div class="url-indicator"></div>
        </div>
      `;
    }

    // DEMO
    function renderDemo() {
      return `
        <div>
          <h2>🧪 ${t('demoBtn')} · WR Hacks</h2>
          <div class="demo-grid">
            <div class="demo-panel">
              <h3>✉️ ${t('demoMsg')}</h3>
              <p style="margin:5px 0">📧 ${t('gmailContact')}</p>
              <div class="input-group">
                <input type="text" id="msgSubject" placeholder="${currentLang==='es'?'Asunto':'Subject'}" value="Consulta WR Hacks">
              </div>
              <div class="input-group">
                <textarea id="msgBody" rows="3" placeholder="${currentLang==='es'?'Escribe tu mensaje...':'Write your message...'}"></textarea>
              </div>
              <button class="action-btn" id="sendMsgBtn">📨 ${t('sendMsg')}</button>
              <p id="msgFeedback" style="margin-top:8px;"></p>
            </div>
            <div class="demo-panel">
              <h3>📞 ${t('callOwner')}</h3>
              <p style="font-size:0.9rem;">${currentLang==='es'?'Llamada directa dentro de la web':'Direct call inside the page'}</p>
              <button class="action-btn call" id="instantCallBtn">📞 ${t('callNow')}</button>
              <div style="margin: 25px 0 10px;"><strong>📅 ${t('scheduleCall')}</strong></div>
              <div class="input-group">
                <input type="text" id="callerNameInput" placeholder="${t('yourName')}">
              </div>
              <div class="input-group">
                <input type="datetime-local" id="callDateTime">
              </div>
              <button class="action-btn" id="scheduleCallBtn">📆 ${currentLang==='es'?'Solicitar llamada':'Request call'}</button>
              <p id="scheduleFeedback" style="margin-top:8px;"></p>
            </div>
          </div>
          <button class="back-home" id="backHomeFromDemo">${t('back')}</button>
          <div class="url-indicator"></div>
        </div>
      `;
    }

    // ---------- LÓGICA DE EVENTOS (delegación) ----------
    function attachGlobalListeners() {
      document.addEventListener('click', async (e) => {
        // Botones de navegación
        if (e.target.id === 'goPremiumBtn') navigateTo('premium');
        if (e.target.id === 'goDemoBtn') navigateTo('demo');
        if (e.target.id === 'backHomeBtn' || e.target.id === 'backHomeFromDemo') navigateTo('home');
        
        // Compra plan premium -> abre PayPal en misma pestaña
        if (e.target.id === 'buyPlanBtn') {
          window.location.href = 'https://www.paypal.com/ncp/payment/8HWP3ZM5SYDDE';
        }

        // Enviar mensaje (simulación)
        if (e.target.id === 'sendMsgBtn') {
          const subject = document.getElementById('msgSubject')?.value || '';
          const body = document.getElementById('msgBody')?.value || '';
          const feedback = document.getElementById('msgFeedback');
          if (feedback) {
            feedback.textContent = currentLang==='es'? `✅ Mensaje simulado enviado a ${t('gmailContact')}` : `✅ Simulated message sent to ${t('gmailContact')}`;
          }
          // Mailto opcional, pero lo dejamos como simulación en web
        }

        // Llamada instantánea
        if (e.target.id === 'instantCallBtn') {
          triggerIncomingCall('Usuario Demo');
        }

        // Programar llamada
        if (e.target.id === 'scheduleCallBtn') {
          const name = document.getElementById('callerNameInput')?.value || 'Anónimo';
          const datetime = document.getElementById('callDateTime')?.value;
          if (!datetime) {
            alert(currentLang==='es'?'Selecciona fecha y hora':'Select date & time');
            return;
          }
          appointments.push({
            id: 'apt'+Date.now(),
            name: name,
            datetime: datetime,
            email: 'usuario@demo.com',
            status: 'pendiente'
          });
          const fb = document.getElementById('scheduleFeedback');
          fb.textContent = currentLang==='es'?'✅ Solicitud enviada. Admin la revisará.':'✅ Request sent. Admin will review.';
          updateAdminPanelIfOpen();
        }
      });

      // Lang switch
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentLang = btn.dataset.lang;
          updateLangUI();
        });
      });

      // Admin modal *
      document.getElementById('starAdminBtn').addEventListener('click', openAdminModal);
      document.getElementById('closeAdminModal').addEventListener('click', closeAdminModal);
      document.getElementById('submitPassBtn').addEventListener('click', checkPassword);
      document.getElementById('adminPassInput').addEventListener('keypress', (e) => { if(e.key==='Enter') checkPassword(); });

      // Admin actions delegadas
      document.addEventListener('click', (e) => {
        if (e.target.id === 'acceptCallAdminBtn') handleAdminAcceptCall();
        if (e.target.id === 'rejectCallAdminBtn') handleAdminRejectCall();
        if (e.target.classList.contains('accept-apt-btn')) {
          const id = e.target.dataset.id;
          const apt = appointments.find(a => a.id === id);
          if (apt) apt.status = 'aceptada';
          updateAdminPanelIfOpen();
        }
        if (e.target.classList.contains('reject-apt-btn')) {
          const id = e.target.dataset.id;
          const apt = appointments.find(a => a.id === id);
          if (apt) apt.status = 'rechazada';
          updateAdminPanelIfOpen();
        }
      });

      window.addEventListener('popstate', (e) => {
        if (e.state && e.state.view) {
          currentView = e.state.view;
        } else {
          const path = window.location.pathname;
          if (path.includes('premium')) currentView = 'premium';
          else if (path.includes('demo')) currentView = 'demo';
          else currentView = 'home';
        }
        renderView();
      });
    }

    // Funciones admin
    function openAdminModal() {
      document.getElementById('adminModal').style.display = 'flex';
      document.getElementById('adminLoginSection').style.display = 'block';
      document.getElementById('adminContentArea').style.display = 'none';
      document.getElementById('adminPassInput').value = '';
      adminAuthorized = false;
    }
    function closeAdminModal() {
      document.getElementById('adminModal').style.display = 'none';
    }
    function checkPassword() {
      const pass = document.getElementById('adminPassInput').value;
      if (pass === 'Alex27Junio') {
        adminAuthorized = true;
        document.getElementById('adminLoginSection').style.display = 'none';
        document.getElementById('adminContentArea').style.display = 'block';
        document.getElementById('passError').textContent = '';
        updateAdminPanel();
      } else {
        document.getElementById('passError').textContent = 'Contraseña incorrecta';
      }
    }

    function updateAdminPanelIfOpen() {
      if (adminAuthorized && document.getElementById('adminModal').style.display === 'flex') {
        updateAdminPanel();
      }
    }

    function updateAdminPanel() {
      renderCallLog();
      renderAppointments();
      updateLiveCallUI();
    }

    function renderCallLog() {
      const container = document.getElementById('callLogList');
      if (!container) return;
      container.innerHTML = callRecords.map(c => `
        <div class="record-item">
          <span>📅 ${c.timestamp} · ${c.country} · ${c.status}</span>
        </div>`).join('') || '<p>Sin registros</p>';
    }

    function renderAppointments() {
      const cont = document.getElementById('appointmentList');
      if (!cont) return;
      cont.innerHTML = appointments.map(apt => `
        <div class="record-item flex-row" style="justify-content:space-between;">
          <div><strong>${apt.name}</strong> · ${apt.datetime.replace('T',' ')} · ${apt.status}</div>
          <div>
            ${apt.status === 'pendiente' ? `
              <button class="badge accept-apt-btn" data-id="${apt.id}" style="background:#2e7d5e;border:none;cursor:pointer;">✅ Aceptar</button>
              <button class="badge reject-apt-btn" data-id="${apt.id}" style="background:#9e4a4a;border:none;cursor:pointer;">❌ Rechazar</button>
            ` : ''}
          </div>
        </div>
      `).join('');
    }

    function updateLiveCallUI() {
      const noLive = document.getElementById('noLiveCallMsg');
      const actions = document.getElementById('activeCallActions');
      const info = document.getElementById('liveCallerInfo');
      if (pendingLiveCall) {
        noLive.style.display = 'none';
        actions.style.display = 'block';
        info.textContent = `📲 ${pendingLiveCall.callerName} · ${pendingLiveCall.timestamp}`;
      } else {
        noLive.style.display = 'block';
        actions.style.display = 'none';
      }
    }

    function triggerIncomingCall(callerName = 'Usuario') {
      const now = new Date();
      const timestamp = now.toLocaleString('es-ES');
      const country = 'España'; // simulado
      const callId = Date.now();
      pendingLiveCall = { callerName, timestamp, country, id: callId };
      // Agregar a registro
      callRecords.push({ id: callId, timestamp, country, status: 'entrante' });
      
      // Si admin está abierto, actualizar
      updateAdminPanelIfOpen();
      
      // Notificación simple
      alert(`📞 ${t('calling')} ${callerName} ... El dueño puede responder.`);
    }

    function handleAdminAcceptCall() {
      if (!pendingLiveCall) return;
      const rec = callRecords.find(r => r.id === pendingLiveCall.id);
      if (rec) rec.status = 'atendida';
      alert(`✅ Llamada aceptada (simulación) con ${pendingLiveCall.callerName}`);
      pendingLiveCall = null;
      updateAdminPanelIfOpen();
    }
    function handleAdminRejectCall() {
      if (!pendingLiveCall) return;
      const rec = callRecords.find(r => r.id === pendingLiveCall.id);
      if (rec) rec.status = 'rechazada';
      alert(`❌ Llamada rechazada`);
      pendingLiveCall = null;
      updateAdminPanelIfOpen();
    }

    // Inicializar
    function init() {
      // Establecer ruta inicial
      const path = window.location.pathname;
      if (path.includes('premium')) currentView = 'premium';
      else if (path.includes('demo')) currentView = 'demo';
      else currentView = 'home';
      renderView();
      attachGlobalListeners();
      window.history.replaceState({ view: currentView }, '', currentView==='home'?'/':'/'+currentView);
    }

    init();
  })();
</script>
</body>
</html>
